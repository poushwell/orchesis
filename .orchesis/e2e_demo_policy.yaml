default_trust_tier: intern
agents:
  - id: cursor
    name: Cursor
    trust_tier: operator
  - id: untrusted_bot
    name: Untrusted Bot
    trust_tier: intern
  - id: blocked_agent
    name: Blocked Agent
    trust_tier: blocked
rules:
  - name: budget_limit
    max_cost_per_call: 10.0
    daily_budget: 5.0
  - name: file_access
    allowed_paths: ["/data", "/tmp"]
    denied_paths: ["/etc", "/root"]
  - name: sql_restriction
    denied_operations: ["DROP", "DELETE", "TRUNCATE", "ALTER", "GRANT"]
  - name: rate_limit
    max_requests_per_minute: 60
  - name: command_pattern_guard
    type: regex_match
    field: params.command
    deny_patterns:
      - '(?i)rm\s+-rf\s+'
  - name: context_limits
    type: context_rules
    rules:
      - agent: "*"
        max_cost_per_call: 10.0
  - name: write_guard
    type: composite
    operator: AND
    conditions:
      - rule: file_access
      - rule: budget_limit