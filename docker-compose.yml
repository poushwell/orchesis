services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn orchesis.demo_backend:app --host 0.0.0.0 --port 8081
    ports:
      - "8081:8081"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn orchesis.proxy:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      POLICY_PATH: /app/policy.yaml
      BACKEND_URL: http://backend:8081
    volumes:
      - ./examples/policy.yaml:/app/policy.yaml:ro
