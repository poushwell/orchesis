version: "1.0"
default_trust_tier: assistant
agents:
  - id: "openclaw"
    name: "OpenClaw Agent"
    trust_tier: operator
    daily_budget: 50.0
    rate_limit_per_minute: 30
rules:
  - name: file_access
    allowed_paths: ["/workspace", "/tmp", "/data"]
    denied_paths: ["/etc", "/root", "/.ssh", "/.aws", "/.env", "/var/secrets"]
  - name: sql_restriction
    denied_operations: ["DROP", "DELETE", "TRUNCATE", "ALTER", "GRANT"]
  - name: budget_limit
    max_cost_per_call: 2.0
    daily_budget: 50.0
  - name: rate_limit
    max_requests_per_minute: 30
  - name: command_guard
    type: regex_match
    field: params.command
    deny_patterns:
      - "(?i)rm\\s+-rf"
      - "(?i)curl\\s+[^|]*\\|\\s*bash"
