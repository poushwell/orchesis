[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta:__legacy__"

[project]
name = "orchesis"
version = "0.7.0"
description = "AI Agent Security Runtime — Policy enforcement for autonomous AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Orchesis Project"}]
keywords = ["ai", "security", "agents", "mcp", "policy", "runtime", "compliance"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]

dependencies = [
    "pyyaml>=6.0",
    "click>=8.0",
]

[project.optional-dependencies]
crypto = ["cryptography>=41.0"]
server = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "httpx>=0.24.0",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "hypothesis>=6.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "httpx>=0.24.0",
    "cryptography>=41.0",
    "mcp>=0.1.0",
    "pytest-asyncio>=0.21.0",
]

[project.urls]
Homepage = "https://github.com/orchesis-security/orchesis"
Documentation = "https://github.com/orchesis-security/orchesis/docs"
Repository = "https://github.com/orchesis-security/orchesis"
Issues = "https://github.com/orchesis-security/orchesis/issues"

[project.scripts]
orchesis = "orchesis.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
orchesis = ["marketplace/packs/*.yaml"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501", "F401", "I001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
