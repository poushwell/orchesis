rules:
  - name: budget_limit
    max_cost_per_call: 0.50
    daily_budget: 50.00

  - name: file_access
    allowed_paths:
      - "/data"
      - "/tmp"
    denied_paths:
      - "/etc"
      - "/root"
      - "/var/secrets"

  - name: sql_restriction
    allowed_operations:
      - "SELECT"
      - "INSERT"
    denied_operations:
      - "DROP"
      - "DELETE"
      - "TRUNCATE"
      - "ALTER"

  - name: rate_limit
    max_requests_per_minute: 100

default_action: deny

budgets:
  daily: 50.0
  daily_limit_usd: 50.0

loop_detection:
  enabled: true
  threshold: 5
  window_seconds: 60
  action: warn

secret_scanning:
  enabled: true

tool_access:
  default: allow

kill_switch:
  enabled: false

audit:
  enabled: true
  log_path: ".orchesis/audit.jsonl"
