name: Bug report
description: Report a reproducible bug in Orchesis
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this issue.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, config, and commands.
      placeholder: |
        1. Run `orchesis proxy --config ...`
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Orchesis version
      placeholder: "0.1.0"
    validations:
      required: true

