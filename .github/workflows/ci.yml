name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install
        run: pip install -e .[dev]
      
      - name: Lint
        run: ruff check .
      
      - name: Test
        run: pytest --tb=short -q
      
      - name: Invariants
        run: orchesis invariants --policy examples/production_policy.yaml
      
      - name: Quick fuzz
        run: orchesis fuzz --policy examples/production_policy.yaml --count 500
      
      - name: Corpus regression
        run: pytest tests/test_corpus_regression.py -v
