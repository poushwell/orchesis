name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest --tb=short -q

      - name: Verify invariants
        run: orchesis invariants --policy examples/production_policy.yaml

      - name: Engine hardening benchmark
        run: pytest tests/test_engine_hardening.py -q -s
