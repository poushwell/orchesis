name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e ".[dev]"
          pip install ruff
          pip install pyyaml httpx hypothesis mcp pytest-asyncio fastapi
      - run: ruff check src/

