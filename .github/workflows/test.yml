name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

      - name: Check zero dependencies
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          deps = data.get('project', {}).get('dependencies', [])
          assert len(deps) == 0, f'Found runtime dependencies: {deps}'
          print('✓ Zero runtime dependencies confirmed')
          "

      - name: Verify CLI works
        run: |
          orchesis --version
          orchesis quickstart --preset minimal --non-interactive --output /tmp/test.yaml
          echo "✓ CLI works"

