name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install -e ".[dev]"
          pip install pyyaml httpx hypothesis mcp pytest-asyncio fastapi

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

      - name: Check runtime dependencies
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          project = data.get('project', {})
          deps = project.get('dependencies', [])
          assert isinstance(deps, list), 'project.dependencies must be a list'
          # Core dependencies are intentionally empty; extras carry optional stacks.
          optional = project.get('optional-dependencies', {})
          yaml_extra = optional.get('yaml', [])
          assert any('pyyaml' in str(item).lower() for item in yaml_extra), (
              f'pyyaml must be listed in [project.optional-dependencies].yaml: {yaml_extra!r}'
          )
          print('OK: project.dependencies valid (empty core deps allowed)')
          print('OK: pyyaml declared under optional-dependencies.yaml')
          "

      - name: Verify CLI works
        run: |
          orchesis --version
          orchesis quickstart --preset minimal --non-interactive --output /tmp/test.yaml
          echo "✓ CLI works"

