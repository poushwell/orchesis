name: development
version: "1.0"
description: "Balanced policy for development environments"
author: "Orchesis Project"
tags: ["dev", "cursor", "claude-code"]
plugins_required: []
rules:
  - name: file_access
    allowed_paths: ["/workspace", "/data", "/tmp"]
    denied_paths: ["/etc", "/root", "/.ssh", "/.aws"]
  - name: sql_restriction
    denied_operations: ["DROP", "TRUNCATE", "GRANT"]
  - name: budget_limit
    max_cost_per_call: 2.0
    daily_budget: 50.0
  - name: rate_limit
    max_requests_per_minute: 60
agents:
  - id: "cursor"
    name: "Cursor Agent"
    trust_tier: operator
  - id: "claude_code"
    name: "Claude Code Agent"
    trust_tier: operator
