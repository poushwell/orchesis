name: openclaw-secure
version: "1.0"
description: "Hardened policy for OpenClaw agents"
author: "Orchesis Project"
tags: ["openclaw", "security"]
plugins_required: []
rules:
  - name: file_access
    allowed_paths: ["/workspace", "/tmp", "/data"]
    denied_paths: ["/etc", "/root", "/.ssh", "/.aws", "/.env", "/var/secrets"]
  - name: sql_restriction
    denied_operations: ["DROP", "DELETE", "TRUNCATE", "ALTER", "GRANT"]
  - name: budget_limit
    max_cost_per_call: 1.0
    daily_budget: 25.0
  - name: rate_limit
    max_requests_per_minute: 20
  - name: command_pattern_guard
    type: regex_match
    field: params.command
    deny_patterns:
      - "(?i)curl\\s+[^|]*\\|\\s*bash"
      - "(?i)wget\\s+[^|]*\\|\\s*sh"
agents:
  - id: "openclaw"
    name: "OpenClaw Agent"
    trust_tier: operator
    daily_budget: 25.0
    rate_limit_per_minute: 20
